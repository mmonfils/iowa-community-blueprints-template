<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  
  <style>
    /* High-Contrast Mobile Typography & Colors */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #111111;
      background-color: #ffffff;
      margin: 0;
      padding: 12px;
      font-size: 16px;
    }

    /* Constrained Container for Fast Phone Scanning */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    /* High-Visibility Clean Header Block */
    header {
      background-color: #1a365d;
      color: #ffffff;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    
    header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
    }
    
    header p {
      margin: 4px 0 0 0;
      font-size: 0.95rem;
      color: #e2e8f0;
    }

    /* Content Hierarchy Adjustments */
    h1, h2, h3 {
      color: #1a365d;
      line-height: 1.2;
    }
    
    h1 { font-size: 1.5rem; margin-top: 24px; }
    h2 { font-size: 1.25rem; margin-top: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 4px; }
    h3 { font-size: 1.1rem; margin-top: 16px; }

    /* Touch-Target Optimizations for Phone Screen Hyperlinks */
    a {
      color: #2b6cb0;
      text-decoration: underline;
      font-weight: 600;
      display: inline-block;
      padding: 4px 2px;
    }

    a:active {
      background-color: #ebf8ff;
      color: #2c5282;
    }

    /* Structural Block Dividers */
    hr {
      border: 0;
      height: 2px;
      background: #cbd5e0;
      margin: 24px 0;
    }

    /* Clean, Horizontal Mobile Ledger Styling */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9rem;
    }

    th {
      background-color: #edf2f7;
      color: #2d3748;
      font-weight: 700;
      text-align: left;
    }

    th, td {
      padding: 10px;
      border: 1px solid #e2e8f0;
      vertical-align: top;
    }

    tr:nth-child(even) {
      background-color: #f7fafc;
    }

    /* Uncluttered Bullet Lists with Generous Spacing */
    ul, ol {
      padding-left: 20px;
      margin: 12px 0;
    }

    li {
      margin-bottom: 8px;
    }

    /* Mobile Quick-Action Navigation Accents */
    .navigation-box {
      background-color: #f7fafc;
      border-left: 4px solid #2b6cb0;
      padding: 12px;
      margin: 16px 0;
      border-radius: 0 4px 4px 0;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <header>
      <h1>{{ site.title }}</h1>
      <p>{{ site.description }}</p>
    </header>

    <main>
      {{ content }}
    </main>

  </div>

</body>
</html>
